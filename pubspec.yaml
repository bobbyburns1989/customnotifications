name: custom_notify
description: "Your Alerts, Your Way. Create custom notifications without an account."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Notifications
  flutter_local_notifications: ^20.1.0

  # Background tasks
  workmanager: ^0.5.2

  # Timezone
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1

  # Database (SQLite ORM)
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.28

  # Simple key-value storage
  shared_preferences: ^2.3.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^14.8.1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # In-app purchases
  purchases_flutter: ^8.6.0

  # Permissions
  permission_handler: ^11.3.1

  # Battery optimization
  disable_battery_optimization: ^1.1.1

  # UUID
  uuid: ^4.5.1

  # Date/time formatting
  intl: ^0.19.0

  # Path utilities
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI utilities
  flutter_colorpicker: ^1.1.0
  cupertino_icons: ^1.0.8

  # Audio playback (for sound preview in notification designer)
  audioplayers: ^6.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.22.0
  freezed: ^2.4.6
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.9

  # Launcher icons
  flutter_launcher_icons: ^0.14.2
  mockito: ^5.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/icons/
    - assets/templates/
    - assets/legal/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-ExtraBold.ttf
          weight: 800
